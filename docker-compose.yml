version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: mudrek-db
    restart: always
    environment:
      POSTGRES_DB: mudrek_crm
      POSTGRES_USER: mudrek_user
      POSTGRES_PASSWORD: mudrek_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: mudrek-api
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://mudrek_user:mudrek_password@db:5432/mudrek_crm?schema=public
      PORT: 4000
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000/api
    container_name: mudrek-ui
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
