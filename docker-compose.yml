version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: mudrek-db
    restart: always
    environment:
      POSTGRES_DB: mudrek_crm
      POSTGRES_USER: mudrek_user
      POSTGRES_PASSWORD: mudrek_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mudrek_user -d mudrek_crm"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: mudrek-api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://mudrek_user:mudrek_password@db:5432/mudrek_crm?schema=public
      PORT: 4000
      NODE_ENV: production
      FRONTEND_URL: https://studentsclients.mudrek.com
    command: sh -c "npx prisma migrate deploy && npm start"
    expose:
      - "4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://studentsclients.mudrek.com/api
    container_name: mudrek-ui
    restart: always
    depends_on:
      - backend
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: mudrek-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
