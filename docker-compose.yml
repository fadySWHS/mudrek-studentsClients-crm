services:
  db:
    image: postgres:15-alpine
    container_name: mudrek-db
    restart: always
    environment:
      POSTGRES_DB: mudrek_crm
      POSTGRES_USER: mudrek_user
      POSTGRES_PASSWORD: mudrek_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mudrek_user -d mudrek_crm"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: mudrek-api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://mudrek_user:mudrek_password@db:5432/mudrek_crm?schema=public
      PORT: 4000
      NODE_ENV: production
      FRONTEND_URL: https://studentsclients.mudrek.com
      JWT_SECRET: a82f0b3c3820fbeefa1bab6f60ad780dad762a2b1cf0c37cd5cb500625bffae3102660a64cb6c46d499479d2c0687793b821be39695b141012ac17b6f743e823
      JWT_EXPIRES_IN: 7d
    expose:
      - "4000"
    command: sh -c "npx prisma db push --accept-data-loss && npm start"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://studentsclients.mudrek.com/api
    container_name: mudrek-ui
    restart: always
    depends_on:
      - backend
    expose:
      - "3000"

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: mudrek-nginx
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.studentsclients.rule=Host(`studentsclients.mudrek.com`)"
      - "traefik.http.routers.studentsclients.entrypoints=websecure"
      - "traefik.http.routers.studentsclients.tls.certresolver=letsencrypt"
      - "traefik.http.services.studentsclients.loadbalancer.server.port=8080"
    expose:
      - "8080"
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
