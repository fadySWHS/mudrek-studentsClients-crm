services:
  db:
    image: postgres:15-alpine
    container_name: mudrek-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mudrek-api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: 4000
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
    expose:
      - "4000"
    command: sh -c "npx prisma db push --accept-data-loss && npm start"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: mudrek-ui
    restart: always
    depends_on:
      - backend
    expose:
      - "3000"

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: mudrek-nginx
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.studentsclients.rule=Host(`studentsclients.mudrek.com`)"
      - "traefik.http.routers.studentsclients.entrypoints=websecure"
      - "traefik.http.routers.studentsclients.tls.certresolver=letsencrypt"
      - "traefik.http.services.studentsclients.loadbalancer.server.port=8080"
    expose:
      - "8080"
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
