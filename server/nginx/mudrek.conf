# ╔══════════════════════════════════════════════════════════════════════╗
# ║  Mudrek CRM — Nginx Config                                          ║
# ║  Subdomain: crm.yourdomain.com                                      ║
# ║                                                                      ║
# ║  SAFE FOR SHARED VPS — this file only handles crm.yourdomain.com    ║
# ║  Your WordPress (yourdomain.com) has its own config and is          ║
# ║  NEVER touched by this file.                                         ║
# ║                                                                      ║
# ║  Place at:  /etc/nginx/sites-available/mudrek-crm                   ║
# ║  Enable:    ln -s /etc/nginx/sites-available/mudrek-crm \           ║
# ║                   /etc/nginx/sites-enabled/mudrek-crm               ║
# ║  Test:      sudo nginx -t                                            ║
# ║  Apply:     sudo systemctl reload nginx   (reload = zero downtime)  ║
# ╚══════════════════════════════════════════════════════════════════════╝

# ── HTTP → HTTPS redirect for the CRM subdomain only ─────────────────────────
server {
    listen 80;
    server_name crm.yourdomain.com;

    # Only handles the CRM subdomain — WordPress domain is untouched
    return 301 https://$host$request_uri;
}

# ── HTTPS — CRM subdomain ─────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name crm.yourdomain.com;

    # SSL — issued ONLY for crm.yourdomain.com by Certbot
    # Run: sudo certbot --nginx -d crm.yourdomain.com
    # (does NOT affect your main domain's certificate)
    ssl_certificate     /etc/letsencrypt/live/crm.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # ── Frontend: Next.js on port 3000 ────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Backend API: Express on port 4000 ─────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Next.js static assets — long-lived cache ──────────────────────────────
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Logs — isolated from WordPress logs ───────────────────────────────────
    access_log /var/www/mudrek/logs/nginx-access.log;
    error_log  /var/www/mudrek/logs/nginx-error.log;
}

# ─────────────────────────────────────────────────────────────────────────────
# NOTE: Add this line inside the http {} block in /etc/nginx/nginx.conf
# ONLY if it is not already present (check with: grep limit_req_zone /etc/nginx/nginx.conf)
#
#   limit_req_zone $binary_remote_addr zone=mudrek_api:10m rate=30r/m;
# ─────────────────────────────────────────────────────────────────────────────
